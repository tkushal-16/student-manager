spring:
  application:
    name: student-manager
  datasource:
    url: jdbc:postgresql://localhost:5432/student_manager
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jackson:
    time-zone: Asia/Kolkata

  main:
    allow-circular-references: false